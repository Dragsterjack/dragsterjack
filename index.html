<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photos — Dragsterjack</title>
<meta name="description" content="Photography by Dragsterjack">
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --white: #ffffff;
    --black: #111111;
    --gray-1: #1a1a1a;
    --gray-2: #333;
    --gray-3: #666;
    --gray-4: #999;
    --gray-5: #e8e8e6;
    --red: #c0392b;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
  }

  .header {
    padding: 48px 24px;
    text-align: center;
    border-bottom: 1px solid var(--gray-2);
  }

  .title {
    font-family: 'Oswald', sans-serif;
    font-size: 3rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--gray-4);
  }

  .gallery {
    max-width: 1400px;
    margin: 0 auto;
    padding: 48px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .photo-card {
    position: relative;
    aspect-ratio: 3/2;
    overflow: hidden;
    border-radius: 8px;
    cursor: pointer;
    background: var(--gray-1);
  }

  .photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }

  .photo-card:hover img {
    transform: scale(1.05);
  }

  .admin-trigger {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    background: var(--white);
    color: var(--black);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: all 0.3s;
    z-index: 100;
  }

  .admin-trigger:hover {
    transform: scale(1.1);
  }

  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    overflow-y: auto;
  }

  .modal.active {
    display: block;
  }

  .modal-content {
    max-width: 900px;
    margin: 48px auto;
    background: var(--gray-1);
    border-radius: 12px;
    padding: 32px;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }

  .modal-title {
    font-family: 'Oswald', sans-serif;
    font-size: 2rem;
    text-transform: uppercase;
  }

  .close-btn {
    background: none;
    border: none;
    color: var(--white);
    font-size: 2rem;
    cursor: pointer;
    padding: 0;
    width: 40px;
    height: 40px;
  }

  .tabs {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--gray-2);
  }

  .tab {
    padding: 12px 24px;
    background: none;
    border: none;
    color: var(--gray-4);
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab.active {
    color: var(--white);
    border-bottom-color: var(--white);
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 0.9rem;
  }

  .form-input, .form-select {
    width: 100%;
    padding: 12px 16px;
    background: var(--black);
    border: 1px solid var(--gray-2);
    border-radius: 8px;
    color: var(--white);
    font-size: 0.95rem;
    font-family: inherit;
  }

  .form-input:focus, .form-select:focus {
    outline: none;
    border-color: var(--white);
  }

  .btn {
    background: var(--white);
    color: var(--black);
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.95rem;
    transition: all 0.2s;
  }

  .btn:hover {
    transform: translateY(-2px);
  }

  .btn-danger {
    background: var(--red);
    color: var(--white);
  }

  .upload-area {
    border: 2px dashed var(--gray-3);
    border-radius: 8px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
  }

  .upload-area:hover {
    border-color: var(--white);
    background: rgba(255,255,255,0.05);
  }

  .gallery-list {
    display: grid;
    gap: 16px;
  }

  .gallery-item {
    background: var(--black);
    padding: 20px;
    border-radius: 8px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
  }

  .gallery-info h3 {
    margin-bottom: 8px;
  }

  .gallery-meta {
    color: var(--gray-4);
    font-size: 0.85rem;
  }

  .gallery-actions {
    display: flex;
    gap: 8px;
  }

  .msg {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    display: none;
  }

  .msg.active {
    display: block;
  }

  .msg.success {
    background: #d4edda;
    color: #155724;
  }

  .msg.error {
    background: #f8d7da;
    color: #721c24;
  }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--gray-4);
  }

  #fileInput {
    display: none;
  }

  @media (max-width: 768px) {
    .title { font-size: 2rem; }
    .gallery { grid-template-columns: 1fr; }
    .gallery-item { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1 class="title">Photography</h1>
  <p class="subtitle">Sports & Action</p>
</div>

<div class="gallery" id="showcaseGallery">
  <div class="empty-state">
    <p>No photos in showcase yet</p>
  </div>
</div>

<div class="admin-trigger" onclick="openAdmin()">⚙️</div>

<!-- Admin Modal -->
<div class="modal" id="adminModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">Admin Panel</h2>
      <button class="close-btn" onclick="closeAdmin()">×</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('showcase')">Showcase Photos</button>
      <button class="tab" onclick="switchTab('galleries')">Client Galleries</button>
    </div>

    <div class="msg" id="adminMsg"></div>

    <!-- Showcase Tab -->
    <div class="tab-content active" id="showcaseTab">
      <div class="form-group">
        <label class="form-label">Upload Photos to Showcase</label>
        <div class="upload-area" onclick="document.getElementById('showcaseFileInput').click()">
          <div style="font-size: 3rem; margin-bottom: 16px;">📸</div>
          <div><strong>Click to upload</strong> or drag and drop</div>
          <small style="color: var(--gray-4);">Images only • Full quality preserved</small>
        </div>
        <input type="file" id="showcaseFileInput" accept="image/*" multiple>
      </div>

      <div id="showcasePhotosList"></div>
    </div>

    <!-- Galleries Tab -->
    <div class="tab-content" id="galleriesTab">
      <div class="form-group">
        <label class="form-label">Create New Gallery</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px;">
          <input type="text" id="galleryName" class="form-input" placeholder="Player Name">
          <input type="text" id="galleryPassword" class="form-input" placeholder="Password">
          <button class="btn" onclick="createGallery()">Create</button>
        </div>
      </div>

      <div class="gallery-list" id="galleriesList"></div>

      <!-- Upload to Gallery -->
      <div id="galleryUploadSection" style="display: none; margin-top: 32px; padding-top: 32px; border-top: 1px solid var(--gray-2);">
        <div class="form-group">
          <label class="form-label">Upload Photos to <span id="currentGalleryName"></span></label>
          <div class="upload-area" onclick="document.getElementById('galleryFileInput').click()">
            <div style="font-size: 3rem; margin-bottom: 16px;">📸</div>
            <div><strong>Click to upload</strong></div>
          </div>
          <input type="file" id="galleryFileInput" accept="image/*" multiple>
        </div>

        <div id="galleryPhotosList"></div>
      </div>
    </div>
  </div>
</div>

<script>
const PW_HASH = '88056519922f4b7bc7b2b285c66c6f31ade6dc4959098676f689fc0525174b74';
let sbClient = null;
let showcasePhotos = [];
let galleries = [];
let currentGalleryId = null;

const HARDCODED_URL = 'https://ivpmrajkrgcojvdcavwn.supabase.co';
const HARDCODED_KEY = 'sb_publishable_eDKUL25CG1-D3uAiZp7Bjg_iSr8knRX';
const STORAGE_BUCKET = 'photos';

function initSupabase(url, key) {
  try {
    sbClient = window.supabase.createClient(url, key);
    return true;
  } catch(e) {
    console.error('Supabase init error:', e);
    return false;
  }
}

function loadCreds() {
  if (HARDCODED_URL && HARDCODED_KEY) {
    initSupabase(HARDCODED_URL, HARDCODED_KEY);
    return true;
  }
  const url = localStorage.getItem('sb_url');
  const key = localStorage.getItem('sb_key');
  if (url && key) {
    initSupabase(url, key);
    return true;
  }
  return false;
}

async function hashStr(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function openAdmin() {
  const pw = prompt('Admin password:');
  if (!pw) return;
  const hash = await hashStr(pw);
  if (hash !== PW_HASH) {
    alert('Incorrect password');
    return;
  }
  document.getElementById('adminModal').classList.add('active');
  loadShowcasePhotos();
  loadGalleries();
}

function closeAdmin() {
  document.getElementById('adminModal').classList.remove('active');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  
  if (tab === 'showcase') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('showcaseTab').classList.add('active');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('galleriesTab').classList.add('active');
  }
}

// Load showcase photos
async function loadShowcasePhotos() {
  if (!sbClient) return;
  
  try {
    const { data, error } = await sbClient
      .from('photos')
      .select('*')
      .is('gallery_id', null)
      .order('sort_order')
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    showcasePhotos = data || [];
    renderShowcase();
    renderShowcaseList();
  } catch(e) {
    console.error('Load error:', e);
  }
}

function renderShowcase() {
  const grid = document.getElementById('showcaseGallery');
  
  if (showcasePhotos.length === 0) {
    grid.innerHTML = '<div class="empty-state"><p>No photos in showcase yet</p></div>';
    return;
  }
  
  grid.innerHTML = showcasePhotos.map(photo => {
    const { data } = sbClient.storage.from(STORAGE_BUCKET).getPublicUrl(photo.filename);
    return `
      <div class="photo-card">
        <img src="${data.publicUrl}" alt="${photo.original_name}">
      </div>
    `;
  }).join('');
}

function renderShowcaseList() {
  const list = document.getElementById('showcasePhotosList');
  
  if (showcasePhotos.length === 0) {
    list.innerHTML = '<div class="empty-state" style="padding: 20px;"><p>No photos yet</p></div>';
    return;
  }
  
  list.innerHTML = '<div style="margin-top: 32px; padding-top: 32px; border-top: 1px solid var(--gray-2);"><h3 style="margin-bottom: 16px;">Current Photos</h3>' +
    showcasePhotos.map(photo => `
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--black); border-radius: 8px; margin-bottom: 8px;">
        <span>${photo.original_name}</span>
        <button class="btn btn-danger" style="padding: 8px 16px; font-size: 0.85rem;" onclick="deletePhoto('${photo.id}', null)">Delete</button>
      </div>
    `).join('') + '</div>';
}

// File uploads
document.getElementById('showcaseFileInput').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  await uploadPhotos(files, null);
  e.target.value = '';
});

document.getElementById('galleryFileInput').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  await uploadPhotos(files, currentGalleryId);
  e.target.value = '';
});

async function uploadPhotos(files, galleryId) {
  if (!sbClient) return;
  
  for (const file of files) {
    try {
      const timestamp = Date.now();
      const randomStr = Math.random().toString(36).substring(7);
      const ext = file.name.split('.').pop();
      const filename = `${timestamp}_${randomStr}.${ext}`;
      
      const { error: uploadError } = await sbClient.storage
        .from(STORAGE_BUCKET)
        .upload(filename, file);
      
      if (uploadError) throw uploadError;
      
      const { error: dbError } = await sbClient
        .from('photos')
        .insert({
          gallery_id: galleryId,
          filename: filename,
          original_name: file.name,
          sort_order: 0
        });
      
      if (dbError) throw dbError;
      
      showMsg('adminMsg', 'success', `Uploaded ${file.name}`);
    } catch(e) {
      showMsg('adminMsg', 'error', `Failed: ${e.message}`);
    }
  }
  
  if (galleryId) {
    loadGalleryPhotos(galleryId);
  } else {
    loadShowcasePhotos();
  }
}

async function deletePhoto(photoId, galleryId) {
  if (!confirm('Delete this photo?')) return;
  
  try {
    const { data: photo } = await sbClient
      .from('photos')
      .select('filename')
      .eq('id', photoId)
      .single();
    
    await sbClient.storage
      .from(STORAGE_BUCKET)
      .remove([photo.filename]);
    
    await sbClient
      .from('photos')
      .delete()
      .eq('id', photoId);
    
    showMsg('adminMsg', 'success', 'Photo deleted');
    
    if (galleryId) {
      loadGalleryPhotos(galleryId);
    } else {
      loadShowcasePhotos();
    }
  } catch(e) {
    showMsg('adminMsg', 'error', 'Delete failed');
  }
}

// Galleries
async function loadGalleries() {
  if (!sbClient) return;
  
  try {
    const { data, error } = await sbClient
      .from('photo_galleries')
      .select('*, photos(count)')
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    galleries = data || [];
    renderGalleries();
  } catch(e) {
    console.error('Load galleries error:', e);
  }
}

function renderGalleries() {
  const list = document.getElementById('galleriesList');
  
  if (galleries.length === 0) {
    list.innerHTML = '<div class="empty-state" style="padding: 20px;"><p>No galleries yet</p></div>';
    return;
  }
  
  list.innerHTML = galleries.map(gallery => {
    const photoCount = gallery.photos?.[0]?.count || 0;
    return `
      <div class="gallery-item">
        <div class="gallery-info">
          <h3>${gallery.name}</h3>
          <div class="gallery-meta">
            ${photoCount} photos • Password: ${gallery.password} • dragsterjack.com/${gallery.slug}
          </div>
        </div>
        <div class="gallery-actions">
          <button class="btn" onclick="manageGallery('${gallery.id}', '${gallery.name}')">Manage Photos</button>
          <button class="btn btn-danger" onclick="deleteGallery('${gallery.id}')">Delete</button>
        </div>
      </div>
    `;
  }).join('');
}

async function createGallery() {
  const name = document.getElementById('galleryName').value.trim();
  const password = document.getElementById('galleryPassword').value.trim();
  
  if (!name || !password) {
    showMsg('adminMsg', 'error', 'Name and password required');
    return;
  }
  
  const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
  
  try {
    const { error } = await sbClient
      .from('photo_galleries')
      .insert({
        name: name,
        slug: slug,
        password: password
      });
    
    if (error) throw error;
    
    showMsg('adminMsg', 'success', `Gallery created: dragsterjack.com/${slug}`);
    document.getElementById('galleryName').value = '';
    document.getElementById('galleryPassword').value = '';
    loadGalleries();
  } catch(e) {
    showMsg('adminMsg', 'error', 'Failed to create gallery');
  }
}

async function deleteGallery(galleryId) {
  if (!confirm('Delete this gallery and all its photos?')) return;
  
  try {
    const { data: photos } = await sbClient
      .from('photos')
      .select('filename')
      .eq('gallery_id', galleryId);
    
    if (photos && photos.length > 0) {
      await sbClient.storage
        .from(STORAGE_BUCKET)
        .remove(photos.map(p => p.filename));
    }
    
    await sbClient
      .from('photos')
      .delete()
      .eq('gallery_id', galleryId);
    
    await sbClient
      .from('photo_galleries')
      .delete()
      .eq('id', galleryId);
    
    showMsg('adminMsg', 'success', 'Gallery deleted');
    loadGalleries();
  } catch(e) {
    showMsg('adminMsg', 'error', 'Delete failed');
  }
}

function manageGallery(galleryId, galleryName) {
  currentGalleryId = galleryId;
  document.getElementById('currentGalleryName').textContent = galleryName;
  document.getElementById('galleryUploadSection').style.display = 'block';
  loadGalleryPhotos(galleryId);
}

async function loadGalleryPhotos(galleryId) {
  try {
    const { data, error } = await sbClient
      .from('photos')
      .select('*')
      .eq('gallery_id', galleryId)
      .order('sort_order')
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    
    const list = document.getElementById('galleryPhotosList');
    
    if (!data || data.length === 0) {
      list.innerHTML = '<div class="empty-state" style="padding: 20px;"><p>No photos in this gallery yet</p></div>';
      return;
    }
    
    list.innerHTML = '<h3 style="margin: 20px 0 16px;">Photos in Gallery</h3>' +
      data.map(photo => `
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--black); border-radius: 8px; margin-bottom: 8px;">
          <span>${photo.original_name}</span>
          <button class="btn btn-danger" style="padding: 8px 16px; font-size: 0.85rem;" onclick="deletePhoto('${photo.id}', '${galleryId}')">Delete</button>
        </div>
      `).join('');
  } catch(e) {
    console.error('Load gallery photos error:', e);
  }
}

function showMsg(id, type, text) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg active ' + type;
  setTimeout(() => el.classList.remove('active'), 4000);
}

loadCreds();
loadShowcasePhotos();
</script>

</body>
</html>
